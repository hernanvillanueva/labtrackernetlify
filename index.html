*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:2px}
.card{background:#111827;border:1px solid #1e2d45;border-radius:14px}
.btn{cursor:pointer;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;transition:all .15s}
.btn-a{background:#00d4aa;color:#0a0e1a;padding:9px 18px}.btn-a:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-a:disabled{opacity:.4;cursor:default;transform:none;pointer-events:none}
.btn-g{background:transparent;color:#94a3b8;padding:7px 14px;border:1px solid #1e2d45}.btn-g:hover{border-color:#00d4aa;color:#00d4aa}
.row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .12s}.row:hover{background:#1a2236}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
input,select,textarea{font-family:inherit}
</style>
<script>
window.onerror = function(msg, src, line, col, err) {
  console.error('LabTrack error:', msg, err);
};
window.storage = {
  get:function(k){try{const v=localStorage.getItem(k);return Promise.resolve(v?{key:k,value:v}:null);}catch(e){return Promise.resolve(null);}},
  set:function(k,v){try{localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));return Promise.resolve({key:k,value:v});}catch(e){return Promise.resolve(null);}},
  delete:function(k){try{localStorage.removeItem(k);return Promise.resolve({key:k,deleted:true});}catch(e){return Promise.resolve(null);}},
  list:function(p){try{const keys=Object.keys(localStorage).filter(k=>!p||k.startsWith(p));return Promise.resolve({keys});}catch(e){return Promise.resolve({keys:[]});}},
};
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
